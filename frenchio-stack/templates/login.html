<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeFlux. - Connexion</title>
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23111111'/%3E%3Ctext x='50' y='70' font-family='sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EF.%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080710;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-glow: #7c3aed;
            --secondary-glow: #db2777;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            opacity: 0.4;
            filter: blur(80px);
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            opacity: 0.3;
            filter: blur(80px);
            z-index: 0;
        }

        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 10;
            position: relative;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .login-container:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.3);
        }

        .logo-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-glow);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 0.85rem;
            user-select: none;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-color);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4), 0 0 15px rgba(219, 39, 119, 0.2);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Subtle loading spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px 20px;
                margin: 16px;
                border-radius: 16px;
            }
            .logo-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; margin-bottom: 35px;">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width: 48px; height: 48px; flex-shrink: 0;"><circle cx="50" cy="50" r="50" fill="#111111"/><text x="50" y="70" font-family="sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">F.</text></svg>
            <h1 style="margin: 0;">LeFlux.</h1>
            <p style="margin: 0;">Accès au serveur de streaming</p>
        </div>

        <div class="error-message" id="errorMessage" style="align-items: center; gap: 8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span id="errorText">Mot de passe incorrect.</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">MOT DE PASSE DU PORTAL</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Entrez le mot de passe" required autocomplete="current-password" autofocus>
                    <button type="button" id="togglePasswordBtn" class="toggle-password">Afficher</button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Se connecter</span>
            </button>
        </form>

        <div class="footer">
            Nuvio Media Portal &bull; Sécurisé par Caddy
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const submitBtn = document.getElementById('submitBtn');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordBtn.textContent = 'Masquer';
            } else {
                passwordInput.type = 'password';
                togglePasswordBtn.textContent = 'Afficher';
            }
        });

        // Helper to compute SHA-256 hex string
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Handle login submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            
            // Show loading state
            btnSpinner.style.display = 'block';
            btnText.textContent = 'Vérification...';
            submitBtn.disabled = true;

            const password = passwordInput.value;
            const hash = await sha256(password);
            
            // Secure SHA-256 hash of "frenchio_admin_123"
            const targetHash = "8bb8d91c30cce3610121170ead8bbd3fe5759998a07b91c7ffb81929dbcbd46e";

            // Add artificial delay for visual smoothness and to prevent brute force
            await new Promise(resolve => setTimeout(resolve, 600));

            if (hash === targetHash) {
                // Set cookie valid for 1 year
                document.cookie = `frenchio_auth=${password}; path=/; max-age=31536000; secure; samesite=strict`;
                
                // Retrieve redirect destination
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect') || '/';
                
                window.location.href = redirectUrl;
            } else {
                // Reset form state and show error
                btnSpinner.style.display = 'none';
                btnText.textContent = 'Se connecter';
                submitBtn.disabled = false;
                
                errorText.textContent = 'Mot de passe invalide. Veuillez réessayer.';
                errorMessage.style.display = 'flex';
                
                // Shake animation reset
                errorMessage.style.animation = 'none';
                errorMessage.offsetHeight; // Trigger reflow
                errorMessage.style.animation = 'shake 0.4s ease';
                
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
