<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeFlux. — Explorateur de téléchargements</title>
    <meta name="description" content="LeFlux. Explorateur — Gérer vos téléchargements locaux">
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23111111'/%3E%3Ctext x='50' y='70' font-family='sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EF.%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        :root {
            --bg: #0e0e10;
            --surface-0: #141416;
            --surface-1: #1c1c1f;
            --surface-2: #242428;
            --surface-3: #2c2c31;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.14);
            --text-primary: #f0f0f2;
            --text-secondary: #9898a8;
            --text-muted: #5a5a6e;
            --accent: #e0e0e8;
            --accent-dim: rgba(224,224,232,0.08);
            --accent-hover: rgba(224,224,232,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ─────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-0);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .logo-badge {
            font-size: 0.65rem;
            font-weight: 600;
            background: var(--surface-3);
            color: var(--text-secondary);
            padding: 3px 7px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-logout:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--accent-dim);
        }

        /* ── MAIN ──────────────────────────────── */
        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 32px 60px;
        }

        .explorer-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
        }

        .explorer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .explorer-title h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* Disk Space progress */
        .disk-space-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .disk-progress-bar {
            width: 120px;
            height: 6px;
            background: var(--surface-2);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .disk-progress-fill {
            width: 0%;
            height: 100%;
            background: var(--text-primary);
            transition: width 0.4s ease, background 0.4s ease;
        }

        .explorer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--surface-0);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 20px;
        }

        .modal-select {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 7px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-bulk-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .btn-bulk-delete:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
        }

        .files-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .files-table td {
            padding: 14px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }

        .file-row:hover {
            background: rgba(255,255,255,0.01);
        }

        .file-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 550px;
            word-break: break-all;
        }

        .file-icon {
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .file-action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .file-action-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-files {
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .btn-close-modal {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        /* Global overlay */
        .global-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .global-overlay.open {
            display: flex;
        }
        .global-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── File list dividers and highlights ── */
        .file-row {
            transition: background 0.15s ease;
        }
        .file-row.highlight-delete {
            background: rgba(239, 68, 68, 0.35) !important;
            border-left: none !important;
        }
        
        .action-divider-row td {
            border: none !important;
            padding: 0 !important;
        }
        .divider-action-line {
            height: 16px;
            background: transparent;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -8px 0;
            z-index: 5;
        }
        .divider-action-line::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            border-top: 1px dashed rgba(255, 255, 255, 0.08);
            transform: translateY(-50%);
            z-index: 1;
            pointer-events: none;
            transition: border-color 0.15s ease;
        }
        .file-row:hover + .action-divider-row .divider-action-line::before,
        .action-divider-row:hover .divider-action-line::before {
            border-top: 1px dashed #ef4444;
        }
        .btn-divider-action {
            position: relative;
            display: none;
            background: #ef4444;
            color: #ffffff;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
            font-family: inherit;
            transition: transform 0.1s ease, background 0.15s ease;
        }
        .btn-divider-action:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        .file-row:hover + .action-divider-row .btn-divider-action,
        .action-divider-row:hover .btn-divider-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Responsive Layout fixes */
        @media (max-width: 860px) {
            main { padding: 20px 16px 50px; }
            header { padding: 16px 20px; }
            .explorer-card { padding: 16px; }
            .file-name-cell { max-width: 280px; }
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }
            .logo-badge {
                display: none;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
                gap: 8px !important;
            }
            .btn-logout {
                flex: 1;
                justify-content: center;
            }
            .explorer-header {
                flex-direction: column;
                align-items: stretch;
            }
            .disk-space-wrap {
                margin-top: 8px;
            }
            .explorer-toolbar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
            }
            .explorer-toolbar > div {
                flex-direction: column;
                align-items: stretch !important;
                width: 100%;
            }
            .btn-bulk-delete {
                width: 100%;
                text-align: center;
            }
            .files-table th:nth-child(3),
            .files-table td:nth-child(3) {
                display: none; /* Hide size on tiny screens */
            }
            .file-name-cell {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <span class="logo-text">LeFlux.</span>
            <span class="logo-badge">Control Center</span>
        </div>
        <div class="header-actions" style="display: flex; gap: 10px;">
            <a href="/" class="btn-logout" style="border-color: rgba(255,255,255,0.1); color: var(--text-primary);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Tableau de bord
            </a>
            <button id="logoutBtn" class="btn-logout">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Déconnexion
            </button>
        </div>
    </header>

    <main>
        <div class="explorer-card">
            
            <div class="explorer-header">
                <div class="explorer-title">
                    <h2>Téléchargements locaux</h2>
                    <p style="font-size: 0.82rem; color: var(--text-secondary);">Dossier de stockage : <code>/downloads</code></p>
                </div>
                <!-- Disk Space Info -->
                <div class="disk-space-wrap" id="diskSpaceContainer">
                    <span id="diskSpaceText">Espace disque : Calcul en cours...</span>
                    <div class="disk-progress-bar">
                        <div id="diskSpaceBar" class="disk-progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="explorer-toolbar">
                <div style="display:flex; gap:12px; align-items:center; flex-wrap: wrap; flex: 1;">
                    <div style="display:flex; gap:6px; align-items:center;">
                        <label for="sortBy" style="font-size: 0.8rem; color: var(--text-secondary);">Trier :</label>
                        <select id="sortBy" onchange="loadFiles()" class="modal-select">
                            <option value="mtime_desc">Âge : Récent en premier</option>
                            <option value="mtime_asc">Âge : Vieux en premier</option>
                            <option value="size_desc">Taille : Grand en premier</option>
                            <option value="name_asc">Nom : A-Z</option>
                        </select>
                    </div>
                    <!-- Search Input -->
                    <div style="position: relative; display: flex; align-items: center; flex: 1; min-width: 200px;">
                        <input type="text" id="fileSearch" oninput="filterFiles()" placeholder="Rechercher un fichier/dossier..." class="modal-select" style="width: 100%; padding-left: 28px; box-sizing: border-box; height: 32px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="position: absolute; left: 10px; color: var(--text-muted); pointer-events: none;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                </div>
            </div>

            <!-- Breadcrumbs / Navigation -->
            <div id="fileBreadcrumbs" style="padding: 10px 16px; background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.8rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <!-- Breadcrumbs injected dynamically -->
            </div>

            <!-- Body Files list -->
            <div id="filesListContainer" style="overflow-x: auto;">
                <!-- Table contents injected dynamically -->
            </div>

        </div>
    </main>

    <!-- Custom Warning/Alert Dialog -->
    <div id="customDialog" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="customDialogTitle">Avertissement</h3>
                <button onclick="closeCustomDialog(false)" class="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body" id="customDialogMessage" style="line-height: 1.6; color: var(--text-secondary); font-size: 0.9rem; padding: 20px 24px;">
                <!-- message injected dynamically -->
            </div>
            <div class="modal-footer" style="padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--surface-0);">
                <button id="btnDialogCancel" onclick="closeCustomDialog(false)" class="btn-bulk-delete" style="background: transparent; border-color: var(--border); color: var(--text-secondary);">Annuler</button>
                <button id="btnDialogConfirm" onclick="closeCustomDialog(true)" class="btn-bulk-delete" style="background: var(--text-primary); border-color: var(--text-primary); color: var(--bg);">Confirmer</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', () => {
            document.cookie = "frenchio_auth=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; samesite=strict";
            window.location.href = '/login';
        });

        // Custom dialog helpers (promise-based alert & confirm)
        let dialogResolve = null;
        
        function showCustomConfirm(title, message) {
            return new Promise((resolve) => {
                dialogResolve = resolve;
                document.getElementById('customDialogTitle').textContent = title;
                document.getElementById('customDialogMessage').textContent = message;
                document.getElementById('btnDialogCancel').style.display = 'inline-block';
                document.getElementById('btnDialogConfirm').style.display = 'inline-block';
                document.getElementById('customDialog').classList.add('open');
            });
        }
        
        function showCustomAlert(title, message) {
            return new Promise((resolve) => {
                dialogResolve = resolve;
                document.getElementById('customDialogTitle').textContent = title;
                document.getElementById('customDialogMessage').textContent = message;
                document.getElementById('btnDialogCancel').style.display = 'none';
                document.getElementById('btnDialogConfirm').style.display = 'inline-block';
                document.getElementById('customDialog').classList.add('open');
            });
        }
        
        function closeCustomDialog(result) {
            document.getElementById('customDialog').classList.remove('open');
            if (dialogResolve) {
                dialogResolve(result);
                dialogResolve = null;
            }
        }

        // File manager state
        let allFiles = [];
        let currentPath = "";
        let parentPath = "";

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function formatAge(mtime) {
            const diffMs = Date.now() - (mtime * 1000);
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHr = Math.floor(diffMin / 60);
            const diffDays = Math.floor(diffHr / 24);
            
            if (diffDays > 0) return `il y a ${diffDays} j`;
            if (diffHr > 0) return `il y a ${diffHr} h`;
            if (diffMin > 0) return `il y a ${diffMin} m`;
            return "à l'instant";
        }

        function getFileIcon(filename, isDir = false) {
            if (isDir) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: var(--primary-glow);"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
            const ext = filename.split('.').pop().toLowerCase();
            if (['mkv', 'mp4', 'avi', 'mov', 'webm'].includes(ext)) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: #fb923c;"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>';
            if (['srt', 'vtt', 'ass'].includes(ext)) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: #34d399;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
            if (['nfo', 'txt', 'log'].includes(ext)) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: var(--text-muted);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; color: var(--text-muted);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        }

        function loadFiles(path = currentPath) {
            const container = document.getElementById('filesListContainer');
            container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);"><div class="global-spinner" style="margin: 0 auto 15px;"></div>Chargement...</div>';
            
            const url = '/api/downloads?path=' + encodeURIComponent(path);
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    allFiles = data.files || [];
                    currentPath = data.current_path || "";
                    parentPath = data.parent_path !== undefined ? data.parent_path : "";
                    
                    renderBreadcrumbs();
                    renderDiskSpace(data.disk_usage);
                    renderFiles();
                })
                .catch(err => {
                    container.innerHTML = `<div class="empty-files" style="color:#ef4444;">Erreur de chargement: ${err}</div>`;
                });
        }
        
        function renderDiskSpace(du) {
            const text = document.getElementById('diskSpaceText');
            const bar = document.getElementById('diskSpaceBar');
            if (!text || !bar) return;
            if (du && du.total > 0) {
                const freeSpace = formatBytes(du.free);
                const totalSpace = formatBytes(du.total);
                text.textContent = `Espace libre : ${freeSpace} / ${totalSpace} (${du.percent}% utilisé)`;
                bar.style.width = `${du.percent}%`;
                if (du.percent > 90) {
                    bar.style.background = '#ef4444';
                } else if (du.percent > 75) {
                    bar.style.background = '#f59e0b';
                } else {
                    bar.style.background = 'var(--text-primary)';
                }
            } else {
                text.textContent = "Espace disque non disponible";
                bar.style.width = "0%";
            }
        }
        
        function renderBreadcrumbs() {
            const crumbsContainer = document.getElementById('fileBreadcrumbs');
            if (!crumbsContainer) return;
            
            let html = `<span style="color:var(--text-muted); cursor:pointer; font-weight:500;" onclick="navigateTo('')">downloads</span>`;
            
            if (currentPath) {
                const parts = currentPath.split('/');
                let accumPath = "";
                parts.forEach((p, idx) => {
                    accumPath += (idx > 0 ? "/" : "") + p;
                    const finalPath = accumPath;
                    html += ` <span style="color:var(--border); font-size:0.7rem;">/</span> `;
                    if (idx === parts.length - 1) {
                        html += `<span style="color:var(--text-primary); font-weight:600;">${p}</span>`;
                    } else {
                        html += `<span style="color:var(--text-secondary); cursor:pointer;" onclick="navigateTo('${encodeURIComponent(finalPath)}')">${p}</span>`;
                    }
                });
            }
            crumbsContainer.innerHTML = html;
        }
        
        function navigateTo(path) {
            currentPath = decodeURIComponent(path);
            document.getElementById('fileSearch').value = "";
            loadFiles(currentPath);
        }

        function highlightOlderThan(btn) {
            clearHighlight();
            let row = btn.closest('tr').nextElementSibling;
            while (row) {
                if (row.classList.contains('file-row')) {
                    row.classList.add('highlight-delete');
                }
                row = row.nextElementSibling;
            }
        }

        function clearHighlight() {
            const rows = document.querySelectorAll('.file-row');
            rows.forEach(row => {
                row.classList.remove('highlight-delete');
            });
        }

        function filterFiles() {
            renderFiles();
        }

        function renderFiles() {
            const sortBy = document.getElementById('sortBy').value;
            const searchQuery = document.getElementById('fileSearch').value.toLowerCase().trim();
            
            let filesToDisplay = allFiles;
            if (searchQuery) {
                filesToDisplay = allFiles.filter(f => f.name.toLowerCase().includes(searchQuery));
            }
            
            // Mixed folders & files sorting by chronological age or selected criteria
            filesToDisplay.sort((a, b) => {
                if (sortBy === 'name_asc') return a.name.localeCompare(b.name);
                if (sortBy === 'size_desc') return b.size - a.size;
                if (sortBy === 'mtime_desc') return b.mtime - a.mtime;
                if (sortBy === 'mtime_asc') return a.mtime - b.mtime;
                return 0;
            });
            
            const container = document.getElementById('filesListContainer');
            if (filesToDisplay.length === 0) {
                container.innerHTML = '<div class="empty-files">Aucun fichier ou dossier trouvé.</div>';
                updateSelectedCount();
                return;
            }
            
            let html = `
                <table class="files-table">
                    <thead>
                        <tr>
                            <th style="width: 40px; padding-left: 10px;">
                                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)" style="cursor:pointer; width:16px; height:16px;">
                            </th>
                            <th>Nom</th>
                            <th>Taille</th>
                            <th>Âge</th>
                            <th style="text-align:right; padding-right: 10px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            if (currentPath) {
                html += `
                    <tr class="file-row" style="cursor: pointer;" onclick="navigateTo('${encodeURIComponent(parentPath)}')">
                        <td style="padding-left: 10px;"></td>
                        <td>
                            <div class="file-name-cell">
                                <span class="file-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg></span>
                                <span style="font-weight:600; color:var(--text-primary);">.. (Retour au dossier parent)</span>
                            </div>
                        </td>
                        <td style="color:var(--text-muted);">--</td>
                        <td style="color:var(--text-muted);">--</td>
                        <td style="text-align:right; padding-right: 10px;"></td>
                    </tr>
                    <tr class="action-divider-row"><td colspan="5"><div style="height:1px;"></div></td></tr>
                `;
            }
            
            filesToDisplay.forEach(file => {
                const encodedPath = encodeURIComponent(file.path);
                const fileIcon = getFileIcon(file.name, file.is_dir);
                const sizeCol = file.is_dir ? '--' : formatBytes(file.size);
                
                let clickAction = "";
                let nameStyle = "font-weight:500;";
                if (file.is_dir) {
                    clickAction = `onclick="navigateTo('${encodedPath}')"`;
                    nameStyle = "font-weight:600; color:var(--text-primary); cursor:pointer;";
                }
                
                html += `
                    <tr class="file-row" data-mtime="${file.mtime}">
                        <td style="padding-left: 10px; vertical-align: middle;">
                            <input type="checkbox" class="file-checkbox" data-path="${encodedPath}" onchange="updateSelectedCount()" style="cursor:pointer; width:16px; height:16px;">
                        </td>
                        <td ${clickAction}>
                            <div class="file-name-cell" title="${file.path}">
                                <span class="file-icon">${fileIcon}</span>
                                <span style="${nameStyle}">${file.name}</span>
                            </div>
                        </td>
                        <td style="color:var(--text-secondary); white-space:nowrap;">${sizeCol}</td>
                        <td style="color:var(--text-muted); white-space:nowrap;">${formatAge(file.mtime)}</td>
                        <td style="text-align:right; padding-right: 10px; white-space:nowrap; vertical-align: middle;">
                            <button onclick="deleteFile('${encodedPath}', ${file.is_dir})" class="file-action-btn" title="Supprimer définitivement">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            </button>
                        </td>
                    </tr>
                    <tr class="action-divider-row">
                        <td colspan="5">
                            <div class="divider-action-line">
                                <button onclick="deleteOlderThan(this)" 
                                        onmouseenter="highlightOlderThan(this)" 
                                        onmouseleave="clearHighlight()" 
                                        class="btn-divider-action">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scissors-line-dashed-icon lucide-scissors-line-dashed"><path d="M5.42 9.42 8 12"/><circle cx="4" cy="8" r="2"/><path d="m14 6-8.58 8.58"/><circle cx="4" cy="16" r="2"/><path d="M10.8 14.8 14 18"/><path d="M16 12h-2"/><path d="M22 12h-2"/></svg>
                                    Supprimer à partir de là (plus anciens)
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            updateSelectedCount();
        }

        function toggleSelectAll(masterCheckbox) {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = masterCheckbox.checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            const selected = Array.from(checkboxes).filter(cb => cb.checked);
            const bar = document.getElementById('selectionBar');
            const text = document.getElementById('selectionCountText');
            
            if (selected.length > 0) {
                text.textContent = `${selected.length} élément(s) sélectionné(s)`;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
            
            const selectAll = document.getElementById('selectAllCheckbox');
            if (selectAll) {
                selectAll.checked = checkboxes.length > 0 && selected.length === checkboxes.length;
            }
        }

        async function deleteSelectedFiles() {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            const paths = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => decodeURIComponent(cb.dataset.path));
                
            if (paths.length === 0) return;
            
            const confirmDelete = await showCustomConfirm(
                "Supprimer la sélection ?", 
                `Voulez-vous vraiment supprimer définitivement ces ${paths.length} élément(s) sélectionné(s) ?`
            );
            if (!confirmDelete) return;
            
            fetch('/api/downloads', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paths: paths })
            })
            .then(r => r.json())
            .then(async data => {
                if (data.success) {
                    await showCustomAlert("Suppression réussie", `${data.deleted_count} élément(s) ont été supprimés avec succès.`);
                    loadFiles();
                } else {
                    await showCustomAlert("Erreur", "Erreur lors de la suppression en groupe.");
                }
            })
            .catch(err => showCustomAlert("Erreur", `Erreur: ${err}`));
        }

        async function deleteFile(encodedPath, isDir = false) {
            const path = decodeURIComponent(encodedPath);
            const typeLabel = isDir ? "dossier et tout son contenu" : "fichier";
            const confirmDelete = await showCustomConfirm(
                isDir ? "Supprimer le dossier ?" : "Supprimer le fichier ?", 
                `Voulez-vous vraiment supprimer définitivement ce ${typeLabel} ?\n\n${path}`
            );
            if (!confirmDelete) return;
            
            fetch(`/api/downloads?path=${encodeURIComponent(path)}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(async data => {
                    if (data.success) {
                        loadFiles();
                    } else {
                        await showCustomAlert("Erreur", "Erreur lors de la suppression.");
                    }
                })
                .catch(err => showCustomAlert("Erreur", `Erreur: ${err}`));
        }

        async function deleteOlderThan(btn) {
            let row = btn.closest('tr').nextElementSibling;
            const paths = [];
            while (row) {
                if (row.classList.contains('file-row')) {
                    const checkbox = row.querySelector('.file-checkbox');
                    if (checkbox && checkbox.dataset.path) {
                        paths.push(decodeURIComponent(checkbox.dataset.path));
                    }
                }
                row = row.nextElementSibling;
            }
            
            if (paths.length === 0) {
                await showCustomAlert("Aucun élément", "Aucun élément n'est situé en dessous.");
                return;
            }
            
            const confirmDelete = await showCustomConfirm(
                "Vider à partir d'ici ?", 
                `Voulez-vous vraiment vider le stockage à partir de cet élément ? Cela supprimera définitivement les ${paths.length} élément(s) situé(s) en dessous de la ligne.`
            );
            if (!confirmDelete) return;
            
            fetch('/api/downloads', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paths: paths })
            })
            .then(r => r.json())
            .then(async data => {
                if (data.success) {
                    await showCustomAlert("Suppression réussie", `${data.deleted_count} élément(s) ont été supprimés avec succès.`);
                    loadFiles();
                } else {
                    await showCustomAlert("Erreur", "Erreur lors de la suppression.");
                }
            })
            .catch(err => showCustomAlert("Erreur", `Erreur: ${err}`));
        }

        window.onload = () => {
            loadFiles();
        };
    </script>

    <!-- Floating Bottom Selection Bar -->
    <div id="selectionBar" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1c1f; border: 1px solid rgba(239,68,68,0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.65); padding: 14px 28px; border-radius: var(--radius-md); display: none; align-items: center; gap: 16px; z-index: 1000; transition: all 0.2s ease;">
        <span id="selectionCountText" style="font-size: 0.85rem; font-weight: 500; color: var(--text-primary);">0 éléments sélectionnés</span>
        <button onclick="deleteSelectedFiles()" class="btn-bulk-delete" style="margin: 0; padding: 6px 14px;">Supprimer la sélection</button>
    </div>
</body>
</html>
